<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Docsify Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'My Docs',
      repo: 'TMSTH-Manopg/my-knowledge-base', // เปลี่ยนเป็นชื่อ GitHub ของคุณ
      loadSidebar: true, // เปิดใช้งาน Sidebar สำหรับทำเมนูหลายหน้า
      subMaxLevel: 2
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
